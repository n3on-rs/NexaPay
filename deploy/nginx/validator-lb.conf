# NexaPay Validator Load Balancer (Multi-validator mode)
# Sticky sessions via ip_hash + BFT consensus for state sync.
events {
    worker_connections 1024;
}

http {
    upstream validator_cluster {
        ip_hash;  # Same client IP → same validator (consistency)
        server validator-0:8080 max_fails=2 fail_timeout=10s;
        server validator-1:8080 max_fails=2 fail_timeout=10s;
        server validator-2:8080 max_fails=2 fail_timeout=10s;
    }

    server {
        listen 8080;

        # Increase timeouts for block proposal/voting
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location / {
            proxy_pass http://validator_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            client_max_body_size 25m;
        }
    }
}
