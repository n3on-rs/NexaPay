# NexaPay — reverse proxy (portal + API)
# Install: see install-nginx.sh
#
# Upstreams: Docker maps host 3001 -> portal, 8088 -> nexapay-node

# ---- Portal: https://nexapay.space
server {
    listen 80;
    listen [::]:80;
    server_name nexapay.space www.nexapay.space;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}

# ---- API: https://backend.nexapay.space (must match NEXT_PUBLIC_API_URL)
server {
    listen 80;
    listen [::]:80;
    server_name backend.nexapay.space;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25m;
    }
}
