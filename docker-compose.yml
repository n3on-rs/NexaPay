services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nexapay
      POSTGRES_USER: nexapay
      POSTGRES_PASSWORD: nexapay_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  nexapay-node:
    build: ./blockchain
    ports:
      - "8088:8080"
    environment:
      NEXAPAY_DATABASE_URL: postgresql://nexapay:nexapay_secret@postgres:5432/nexapay
      NEXAPAY_JWT_SECRET: change_this_in_production_64_chars_minimum_change_this_in_production
      NEXAPAY_ENCRYPTION_KEY: 00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff
      NEXAPAY_SYSTEM_PRIVATE_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NEXAPAY_PORT: 8080
      NEXAPAY_PORTAL_URL: https://nexapay.space
      NEXAPAY_PAYMENT_SESSION_MINUTES: 1440
      # Twilio credentials should be provided via environment or .env file in production
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-""}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-""}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-""}
      OTP_FALLBACK_CODE: ${OTP_FALLBACK_CODE:-""}
      # Development helpers
      APP_ENV: development
      DEV_SHOW_OTP: "true"
      NEXAPAY_STATE_DIR: /app/chain_state
      NEXAPAY_CHAIN_DATA_DIR: /app/chain_data
      KYC_DEV_OTP: "554433"
      LIVENESS_MOCK_PASS: "true"
    depends_on:
      - postgres
    volumes:
      - nexapay_chain_data:/app/chain_data
      - nexapay_chain_state:/app/chain_state

  nexapay-web:
    build: ./nexapay-web
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://backend.nexapay.space
    depends_on:
      - nexapay-node

volumes:
  pgdata:
  nexapay_chain_data:
  nexapay_chain_state:
