# NexaPay — Docker Compose (3-validator BFT)
#
#   docker compose up -d --build
#   → PostgreSQL + 3 validator nodes + load balancer + frontend
#   → Ports: 5433 (PG) / 8088 (LB) / 3001 (web)

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nexapay
      POSTGRES_USER: ${POSTGRES_USER:-nexapay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexapay_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    # Database port NOT exposed to host in production — use internal Docker network

  validator-0:
    build: ./blockchain
    ports:
      - "8090:8080"
    environment:
      NEXAPAY_DATABASE_URL: postgresql://${POSTGRES_USER:-nexapay}:${POSTGRES_PASSWORD:-nexapay_secret}@postgres:5432/nexapay
      NEXAPAY_JWT_SECRET: ${NEXAPAY_JWT_SECRET}
      NEXAPAY_ENCRYPTION_KEY: ${NEXAPAY_ENCRYPTION_KEY}
      NEXAPAY_SYSTEM_PRIVATE_KEY: ${NEXAPAY_SYSTEM_PRIVATE_KEY}
      NEXAPAY_PORT: 8080
      NEXAPAY_PORTAL_URL: https://nexapay.space
      NEXAPAY_PAYMENT_SESSION_MINUTES: 1440

      APP_ENV: development
      DEV_SHOW_OTP: "${DEV_SHOW_OTP:-true}"
      NEXAPAY_ADMIN_SEED_KEY: ${NEXAPAY_ADMIN_SEED_KEY}
      NEXAPAY_STATE_DIR: /app/chain_state
      NEXAPAY_CHAIN_DATA_DIR: /app/chain_data
      NEXAPAY_VALIDATOR_COUNT: "3"
      NEXAPAY_VALIDATOR_INDEX: "0"
      NEXAPAY_VALIDATOR_0_KEY: "b5b34bf6a2dcd2469d2f215cc50526421bc31cb3c88139d8b3a4322193e57d59"
      NEXAPAY_VALIDATOR_1_KEY: "966809bd5ecb79923f0dc14ac2421c394769dc9bad58de0ad3c1b6d345ee319d"
      NEXAPAY_VALIDATOR_2_KEY: "5c53c8abcb2322d2ad8b2cd2c08a563cab3c7a41d8900613e34a29231bf7031a"
      NEXAPAY_VALIDATOR_0_URL: "http://validator-0:8080"
      NEXAPAY_VALIDATOR_1_URL: "http://validator-1:8080"
      NEXAPAY_VALIDATOR_2_URL: "http://validator-2:8080"
    depends_on:
      - postgres
    volumes:
      - nexapay_v0_chain_data:/app/chain_data
      - nexapay_v0_chain_state:/app/chain_state

  validator-1:
    build: ./blockchain
    ports:
      - "8091:8080"
    environment:
      NEXAPAY_DATABASE_URL: postgresql://${POSTGRES_USER:-nexapay}:${POSTGRES_PASSWORD:-nexapay_secret}@postgres:5432/nexapay
      NEXAPAY_JWT_SECRET: ${NEXAPAY_JWT_SECRET}
      NEXAPAY_ENCRYPTION_KEY: ${NEXAPAY_ENCRYPTION_KEY}
      NEXAPAY_SYSTEM_PRIVATE_KEY: ${NEXAPAY_SYSTEM_PRIVATE_KEY}
      NEXAPAY_PORT: 8080
      NEXAPAY_PORTAL_URL: https://nexapay.space
      NEXAPAY_PAYMENT_SESSION_MINUTES: 1440

      APP_ENV: development
      DEV_SHOW_OTP: "${DEV_SHOW_OTP:-true}"
      NEXAPAY_ADMIN_SEED_KEY: ${NEXAPAY_ADMIN_SEED_KEY}
      NEXAPAY_STATE_DIR: /app/chain_state
      NEXAPAY_CHAIN_DATA_DIR: /app/chain_data
      NEXAPAY_VALIDATOR_COUNT: "3"
      NEXAPAY_VALIDATOR_INDEX: "1"
      NEXAPAY_VALIDATOR_0_KEY: "b5b34bf6a2dcd2469d2f215cc50526421bc31cb3c88139d8b3a4322193e57d59"
      NEXAPAY_VALIDATOR_1_KEY: "966809bd5ecb79923f0dc14ac2421c394769dc9bad58de0ad3c1b6d345ee319d"
      NEXAPAY_VALIDATOR_2_KEY: "5c53c8abcb2322d2ad8b2cd2c08a563cab3c7a41d8900613e34a29231bf7031a"
      NEXAPAY_VALIDATOR_0_URL: "http://validator-0:8080"
      NEXAPAY_VALIDATOR_1_URL: "http://validator-1:8080"
      NEXAPAY_VALIDATOR_2_URL: "http://validator-2:8080"
    depends_on:
      - postgres
    volumes:
      - nexapay_v1_chain_data:/app/chain_data
      - nexapay_v1_chain_state:/app/chain_state

  validator-2:
    build: ./blockchain
    ports:
      - "8092:8080"
    environment:
      NEXAPAY_DATABASE_URL: postgresql://${POSTGRES_USER:-nexapay}:${POSTGRES_PASSWORD:-nexapay_secret}@postgres:5432/nexapay
      NEXAPAY_JWT_SECRET: ${NEXAPAY_JWT_SECRET}
      NEXAPAY_ENCRYPTION_KEY: ${NEXAPAY_ENCRYPTION_KEY}
      NEXAPAY_SYSTEM_PRIVATE_KEY: ${NEXAPAY_SYSTEM_PRIVATE_KEY}
      NEXAPAY_PORT: 8080
      NEXAPAY_PORTAL_URL: https://nexapay.space
      NEXAPAY_PAYMENT_SESSION_MINUTES: 1440

      APP_ENV: development
      DEV_SHOW_OTP: "${DEV_SHOW_OTP:-true}"
      NEXAPAY_ADMIN_SEED_KEY: ${NEXAPAY_ADMIN_SEED_KEY}
      NEXAPAY_STATE_DIR: /app/chain_state
      NEXAPAY_CHAIN_DATA_DIR: /app/chain_data
      NEXAPAY_VALIDATOR_COUNT: "3"
      NEXAPAY_VALIDATOR_INDEX: "2"
      NEXAPAY_VALIDATOR_0_KEY: "b5b34bf6a2dcd2469d2f215cc50526421bc31cb3c88139d8b3a4322193e57d59"
      NEXAPAY_VALIDATOR_1_KEY: "966809bd5ecb79923f0dc14ac2421c394769dc9bad58de0ad3c1b6d345ee319d"
      NEXAPAY_VALIDATOR_2_KEY: "5c53c8abcb2322d2ad8b2cd2c08a563cab3c7a41d8900613e34a29231bf7031a"
      NEXAPAY_VALIDATOR_0_URL: "http://validator-0:8080"
      NEXAPAY_VALIDATOR_1_URL: "http://validator-1:8080"
      NEXAPAY_VALIDATOR_2_URL: "http://validator-2:8080"
    depends_on:
      - postgres
    volumes:
      - nexapay_v2_chain_data:/app/chain_data
      - nexapay_v2_chain_state:/app/chain_state

  validator-lb:
    image: nginx:alpine
    ports:
      - "8088:8080"
    volumes:
      - ./deploy/nginx/validator-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - validator-0
      - validator-1
      - validator-2

  nexapay-web:
    build:
      context: ./nexapay-web
      args:
        - NEXT_PUBLIC_API_URL=https://backend.nexapay.space
        - API_PROXY_URL=http://validator-lb:8080
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=https://backend.nexapay.space
      - API_PROXY_URL=http://validator-lb:8080
    depends_on:
      - validator-lb

volumes:
  pgdata:
  nexapay_v0_chain_data:
  nexapay_v0_chain_state:
  nexapay_v1_chain_data:
  nexapay_v1_chain_state:
  nexapay_v2_chain_data:
  nexapay_v2_chain_state:
